<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>漢字五子棋 | Sophia老師的AI練習本</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 Phosphor Icons 圖示庫 -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <!-- 引入 Google Fonts (圓潤可愛的字體) -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Nunito', 'Noto Sans TC', sans-serif;
      /* 暖色漸層背景加上微微的紋理感 */
      background: radial-gradient(circle at top right, #fff7ed, #ffedd5, #fed7aa);
      background-attachment: fixed;
    }

    /* 遊戲結束的彈跳動畫 */
    @keyframes bounce-short {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .animate-bounce-short {
      animation: bounce-short 1.5s ease-in-out infinite;
    }
    
    /* 畫面切換的淡入動畫 */
    .fade-in {
      animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ================= 棋盤專屬視覺 ================= */
    #board-wrapper {
      /* 棋盤自適應寬度 */
      width: min(95vw, 65vh, 800px);
      container-type: inline-size;
    }

    .scalable-text {
      /* 字體動態縮放 */
      font-size: clamp(10px, 2.3cqi, 28px);
      line-height: 1.1;
      word-break: break-all; 
      overflow-wrap: break-word;
    }

    /* 空格子的凹槽雕刻文字效果 */
    .engraved-text {
      color: #3b1c00; /* 換成極深的實木咖啡色，大幅提升對比與清晰度 */
      text-shadow: 0px 1px 1.5px rgba(255, 255, 255, 0.8); /* 加強底部的高光反光，維持雕刻立體感 */
      font-weight: 900; /* 強制使用最粗字體，避免筆畫在縮小時糊掉 */
    }

    /* 立體按鈕下壓效果 */
    .btn-3d {
      transition: all 0.1s;
      border-bottom-width: 6px;
    }
    .btn-3d:active {
      border-bottom-width: 2px;
      transform: translateY(4px);
    }
    
    /* 玻璃擬物風格卡片 */
    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 10px 30px rgba(234, 88, 12, 0.1);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col text-gray-800">

  <!-- ==================== 設定畫面 (Setup Screen) ==================== -->
  <div id="setup-screen" class="flex-1 flex flex-col items-center justify-between p-4 sm:p-6 w-full">
    <div class="flex-1 flex items-center justify-center w-full my-4">
      <div class="glass-card rounded-[2rem] max-w-2xl w-full p-6 sm:p-10 transition-all">
        
        <!-- 主設定畫面 -->
        <div id="main-setup-view" class="fade-in">
          <!-- 標題區域 -->
          <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center bg-orange-100 w-20 h-20 rounded-3xl mb-4 shadow-inner rotate-3">
              <i class="ph-fill ph-check-square-offset text-5xl text-orange-500"></i>
            </div>
            <h1 class="text-4xl sm:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-600 to-amber-500 mb-2 tracking-wider">
              漢字五子棋
            </h1>
            <p class="text-gray-500 text-lg font-bold">讓孩子在遊戲中自然開口說華語！</p>
          </div>

          <div class="space-y-8">
            <!-- 遊戲模式選擇 -->
            <div class="bg-white/50 p-4 rounded-3xl shadow-sm border border-gray-100">
              <label class="flex items-center gap-2 text-xl font-black text-gray-700 mb-4 ml-2">
                <i class="ph-fill ph-game-controller text-orange-400"></i> 1. 選擇遊戲模式
              </label>
              <div class="flex flex-col sm:flex-row gap-4">
                <button id="btn-mode-pve" onclick="setGameMode('pve')" class="flex-1 flex flex-col items-center p-5 rounded-2xl border-2 transition-all border-orange-400 bg-orange-50 ring-4 ring-orange-400/20 shadow-md transform scale-[1.02]">
                  <div class="bg-white p-3 rounded-full shadow-sm mb-3">
                    <i class="ph-fill ph-robot text-4xl text-orange-500"></i>
                  </div>
                  <span class="font-black text-xl text-orange-700">挑戰電腦</span>
                  <span class="text-sm text-orange-500/80 mt-1 font-bold">單人練習 • 語音帶讀</span>
                </button>
                <button id="btn-mode-pvp" onclick="setGameMode('pvp')" class="flex-1 flex flex-col items-center p-5 rounded-2xl border-2 transition-all border-gray-200 bg-white hover:bg-gray-50 text-gray-400 hover:text-gray-500">
                  <div class="bg-gray-50 p-3 rounded-full mb-3">
                    <i class="ph-fill ph-users-three text-4xl current-color"></i>
                  </div>
                  <span class="font-black text-xl">雙人對戰</span>
                  <span class="text-sm mt-1 font-bold">課堂活動 • 兩人同樂</span>
                </button>
              </div>
            </div>

            <!-- 題庫區塊 -->
            <div class="bg-white/50 p-4 rounded-3xl shadow-sm border border-gray-100">
              <label class="flex items-center gap-2 text-xl font-black text-gray-700 mb-4 ml-2">
                <i class="ph-fill ph-books text-orange-400"></i> 2. 遊戲題庫
              </label>
              <div class="bg-white p-4 sm:p-5 rounded-2xl border-2 border-orange-100 flex justify-between items-center transition-all hover:border-orange-300 shadow-sm group">
                <div class="overflow-hidden pr-4">
                  <div class="flex items-end gap-2 mb-1">
                    <p class="text-gray-400 font-bold">已載入</p>
                    <p class="text-orange-600 font-black text-3xl leading-none" id="vocab-count-display">0</p>
                    <p class="text-gray-400 font-bold">個生詞</p>
                  </div>
                  <p id="vocab-preview-display" class="text-sm text-gray-500 truncate font-medium bg-gray-50 px-3 py-1 rounded-lg inline-block max-w-full">...</p>
                </div>
                <button onclick="toggleEditVocab(true)" class="shrink-0 bg-orange-50 border-2 border-orange-200 text-orange-600 px-4 py-3 rounded-xl font-black group-hover:bg-orange-100 group-hover:border-orange-300 transition-colors flex items-center gap-2 active:scale-95">
                  <i class="ph-bold ph-pencil-simple text-xl"></i> <span class="hidden sm:inline">編輯</span>
                </button>
              </div>
            </div>

            <button onclick="initGame()" class="btn-3d w-full bg-orange-500 border-orange-700 hover:bg-orange-400 text-white font-black text-2xl py-4 sm:py-5 rounded-2xl flex justify-center items-center gap-3 mt-4">
              <i class="ph-fill ph-play-circle text-3xl"></i> 開始遊戲！
            </button>
          </div>
        </div>

        <!-- 編輯題庫畫面 -->
        <div id="edit-vocab-view" class="fade-in hidden">
          <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center bg-green-100 w-16 h-16 rounded-2xl mb-2 shadow-inner">
              <i class="ph-fill ph-pencil-line text-4xl text-green-500"></i>
            </div>
            <h2 class="text-3xl font-black text-gray-800 tracking-wider">編輯生詞庫</h2>
          </div>
          
          <div class="mb-3 flex flex-col sm:flex-row justify-between sm:items-end gap-2">
            <label class="text-lg font-bold text-gray-600">
              請貼上或輸入生詞 <span class="text-sm font-normal text-gray-400">(以空格或逗號分隔)</span>
            </label>
            <span class="text-green-700 font-black bg-green-100 px-4 py-1.5 rounded-full text-sm inline-block w-max shadow-sm">
              目前字數：<span id="edit-word-count" class="text-lg">0</span> 字
            </span>
          </div>
          
          <textarea id="vocab-input" oninput="updateVocabCount()" class="w-full h-64 p-5 border-4 border-gray-100 rounded-2xl focus:border-green-400 focus:outline-none focus:ring-4 focus:ring-green-100 resize-none text-lg text-gray-700 leading-relaxed font-medium bg-gray-50 focus:bg-white transition-colors"></textarea>
          
          <button onclick="toggleEditVocab(false)" class="btn-3d w-full bg-green-500 border-green-700 hover:bg-green-400 text-white font-black text-xl py-4 rounded-2xl flex justify-center items-center gap-2 mt-6">
            <i class="ph-bold ph-check text-2xl"></i> 完成儲存
          </button>
        </div>

      </div>
    </div>
    <footer class="text-center text-orange-900/40 text-sm font-bold pt-4 w-full">
      Powered by Gemini | Sophia老師的AI練習本
    </footer>
  </div>

  <!-- ==================== 遊戲畫面 (Game Screen) ==================== -->
  <div id="game-screen" class="hidden min-h-screen flex flex-col items-center py-4 sm:py-6 px-2 sm:px-4 w-full relative">
    
    <!-- 頂部控制列 -->
    <div class="w-full max-w-5xl flex justify-between items-center mb-4 sm:mb-6 px-2">
      <div class="flex gap-2 sm:gap-3">
        <button onclick="returnToSetup()" class="bg-white/80 backdrop-blur-sm text-gray-600 px-3 sm:px-4 py-2 sm:py-2.5 rounded-xl shadow-sm border border-white/50 hover:bg-white font-bold flex items-center gap-2 transition-all hover:-translate-y-0.5 active:translate-y-0">
          <i class="ph-bold ph-arrow-left text-xl"></i> <span class="hidden sm:inline">重新設定</span>
        </button>
        <button id="btn-mute" onclick="toggleMute()" class="bg-green-100/80 backdrop-blur-sm text-green-700 px-3 sm:px-4 py-2 sm:py-2.5 rounded-xl shadow-sm border border-white/50 hover:bg-green-100 font-bold flex items-center gap-2 transition-all hover:-translate-y-0.5 active:translate-y-0">
          <i id="icon-mute" class="ph-bold ph-speaker-high text-xl"></i>
          <span id="text-mute" class="hidden md:inline">語音開啟</span>
        </button>
      </div>
      
      <h1 class="text-2xl sm:text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-600 to-amber-600 tracking-widest text-center hidden lg:block drop-shadow-sm">漢字五子棋</h1>
      
      <div class="flex gap-2 sm:gap-3">
        <button id="btn-fullscreen" onclick="toggleFullscreen()" class="bg-white/80 backdrop-blur-sm text-gray-600 px-3 sm:px-4 py-2 sm:py-2.5 rounded-xl shadow-sm border border-white/50 hover:bg-white font-bold flex items-center gap-2 transition-all hover:-translate-y-0.5 active:translate-y-0">
          <i id="icon-fullscreen" class="ph-bold ph-corners-out text-xl"></i>
          <span id="text-fullscreen" class="hidden md:inline">全螢幕</span>
        </button>
        <button onclick="initGame()" class="bg-orange-500 text-white px-3 sm:px-4 py-2 sm:py-2.5 rounded-xl shadow-md border border-orange-400 hover:bg-orange-400 font-bold flex items-center gap-2 transition-all hover:-translate-y-0.5 active:translate-y-0">
          <i class="ph-bold ph-arrows-clockwise text-xl"></i> <span class="hidden sm:inline">重新開局</span>
        </button>
      </div>
    </div>

    <!-- 狀態列 (包含計分與計時) -->
    <div class="glass-card rounded-2xl p-2 sm:p-3 mb-4 sm:mb-6 w-full max-w-5xl flex justify-between items-stretch">
      
      <!-- 黑棋玩家狀態 -->
      <div id="player1-indicator" class="flex-1 flex flex-col sm:flex-row items-center justify-center gap-2 sm:gap-4 px-2 sm:px-6 py-2 sm:py-3 rounded-xl transition-all duration-300">
        <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-gradient-to-br from-gray-600 to-black shadow-[0_4px_6px_rgba(0,0,0,0.5)] border border-gray-700 flex items-center justify-center">
          <i class="ph-fill ph-user text-gray-300 text-sm sm:text-base"></i>
        </div>
        <div class="text-center sm:text-left flex flex-col">
          <span class="font-bold text-xs sm:text-sm text-inherit opacity-80 uppercase tracking-wider">Player 1</span>
          <span class="font-black text-sm sm:text-xl text-inherit">黑棋</span>
        </div>
        <span id="score-p1" class="text-3xl sm:text-5xl font-black text-inherit ml-0 sm:ml-auto drop-shadow-md">0</span>
      </div>
      
      <!-- 中間計時器 -->
      <div class="flex-shrink-0 flex flex-col items-center justify-center px-4 sm:px-8 border-x-2 border-gray-200/50">
        <div class="bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-xs font-bold mb-1 sm:mb-2 shadow-inner flex items-center gap-1">
          <i class="ph-fill ph-clock-countdown"></i> TIME
        </div>
        <div id="timer-display" class="text-2xl sm:text-4xl font-black text-gray-800 font-mono tracking-wider drop-shadow-sm">
          00:00
        </div>
      </div>
      
      <!-- 白棋電腦/玩家狀態 -->
      <div id="player2-indicator" class="flex-1 flex flex-col sm:flex-row-reverse items-center justify-center gap-2 sm:gap-4 px-2 sm:px-6 py-2 sm:py-3 rounded-xl transition-all duration-300">
        <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-gradient-to-br from-white to-gray-200 shadow-[0_4px_6px_rgba(0,0,0,0.3)] border border-gray-300 flex items-center justify-center">
          <i id="p2-icon" class="ph-fill ph-robot text-gray-500 text-sm sm:text-base"></i>
        </div>
        <div class="text-center sm:text-right flex flex-col">
          <span class="font-bold text-xs sm:text-sm text-inherit opacity-80 uppercase tracking-wider">Player 2</span>
          <span id="p2-name" class="font-black text-sm sm:text-xl text-inherit">白棋</span>
        </div>
        <span id="score-p2" class="text-3xl sm:text-5xl font-black text-inherit mr-0 sm:mr-auto drop-shadow-md">0</span>
      </div>
    </div>

    <!-- === 實體木頭質感棋盤 === -->
    <div id="board-wrapper" class="relative mx-auto transform transition-transform duration-500">
      <!-- 木頭底座 (厚度與外陰影) -->
      <div class="absolute inset-0 bg-[#8b5a2b] rounded-[2rem] sm:rounded-[2.5rem] transform translate-y-3 sm:translate-y-4 shadow-[0_20px_40px_rgba(139,69,19,0.5)]"></div>
      
      <!-- 棋盤表面 (淺木紋色與內陰影) -->
      <div class="relative bg-gradient-to-br from-[#eecda3] to-[#ef629f] p-2 sm:p-3.5 rounded-[2rem] sm:rounded-[2.5rem] border-4 sm:border-[6px] border-[#d29b59] shadow-[inset_0_0_30px_rgba(139,69,19,0.2)]">
        <!-- 避免漸層太粉，覆蓋一層半透明木頭色 -->
        <div class="absolute inset-0 bg-[#DEB887]/90 rounded-[1.8rem] sm:rounded-[2.2rem]"></div>
        
        <!-- 網格容器 -->
        <div id="board-container" class="relative grid gap-1 sm:gap-1.5 z-10" style="grid-template-columns: repeat(10, minmax(0, 1fr));">
          <!-- 格子由 JS 動態生成 -->
        </div>
      </div>
    </div>

    <!-- 底部提示 -->
    <div class="mt-8 mb-4 bg-white/60 backdrop-blur-sm px-6 py-3 rounded-full shadow-sm border border-white">
      <p id="game-hint" class="text-gray-600 font-bold text-center flex items-center gap-2">
        <i class="ph-fill ph-lightbulb text-yellow-500 text-xl"></i>
        <span>電腦會自動讀出詞彙，請跟著大聲念喔！</span>
      </p>
    </div>
    
    <!-- 頁尾 -->
    <footer class="text-center text-orange-900/40 text-sm font-bold mt-auto w-full pb-2">
      Powered by Gemini | Sophia老師的AI練習本
    </footer>

    <!-- 遊戲結束 Modal -->
    <div id="gameover-modal" class="hidden absolute inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-md">
      <div class="bg-white rounded-[2.5rem] shadow-2xl p-10 sm:p-12 text-center border-8 border-orange-400 transform animate-bounce-short mx-4 max-w-md w-full relative overflow-hidden">
        <!-- 裝飾背景 -->
        <div class="absolute -top-20 -right-20 w-48 h-48 bg-orange-100 rounded-full blur-3xl opacity-50"></div>
        <div class="absolute -bottom-20 -left-20 w-48 h-48 bg-yellow-100 rounded-full blur-3xl opacity-50"></div>
        
        <div class="relative z-10">
          <i id="modal-icon" class="ph-fill ph-trophy text-[6rem] text-orange-500 mx-auto mb-6 block drop-shadow-lg"></i>
          <h2 id="winner-text" class="text-4xl sm:text-5xl font-black text-gray-800 mb-4 tracking-wider">黑棋獲勝！</h2>
          <p id="gameover-desc" class="text-xl text-gray-600 mb-10 font-bold">太棒了！大家都學會好多新詞了！</p>
          <button onclick="initGame()" class="btn-3d w-full bg-orange-500 border-orange-700 hover:bg-orange-400 text-white font-black text-2xl py-4 rounded-2xl shadow-lg flex justify-center items-center gap-2">
            <i class="ph-bold ph-arrow-counter-clockwise text-3xl"></i> 再玩一次
          </button>
          <button onclick="returnToSetup()" class="mt-4 text-gray-400 font-bold hover:text-gray-600 transition-colors">
            返回設定畫面
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ==================== 核心變數與常數 ====================
    const DEFAULT_VOCAB = "動物園, 老虎, 大象, 玩, 看到, 網路, 電話, 寫信, 說話, 影像, 外公, 外婆, 臺北, 臺南, 旅行, 退休, 舅舅, 紐約, 法國, 一次, 超級市場, 巧克力, 冰淇淋, 牛肉, 青菜, 糖果, 漢堡, 薯條, 週末, 晚餐, 蛋炒飯, 玉米湯, 舒服, 秋天, 春天, 新年, 恭喜, 紅包, 壓歲錢, 燈籠";
    const BOARD_SIZE = 10;
    
    let gameState = 'setup'; 
    let gameMode = 'pve'; 
    let isMuted = false;
    let isFullscreen = false;
    
    let board = [];
    let currentPlayer = 1; // 1: 黑, 2: 白
    let winningLine = [];
    let isComputerThinking = false;
    
    let scores = { 1: 0, 2: 0 };
    let timeElapsed = 0;
    let timerInterval = null;

    // ==================== 初始化與設定 ====================
    document.addEventListener('DOMContentLoaded', () => {
      const vocabInputEl = document.getElementById('vocab-input');
      vocabInputEl.value = DEFAULT_VOCAB;
      updateVocabCount();
      
      document.addEventListener('fullscreenchange', () => {
        isFullscreen = !!document.fullscreenElement;
        updateFullscreenUI();
      });
    });

    function getWordList() {
      const input = document.getElementById('vocab-input').value;
      return input.split(/[\s,、\n]+/).filter(w => w.trim().length > 0);
    }

    function updateVocabCount() {
      const list = getWordList();
      const count = list.length;
      document.getElementById('edit-word-count').innerText = count;
      document.getElementById('vocab-count-display').innerText = count;
      
      const preview = list.slice(0, 5).join(', ') + (count > 5 ? '...' : '');
      document.getElementById('vocab-preview-display').innerText = preview || '無生詞';
    }

    function toggleEditVocab(showEdit) {
      const mainView = document.getElementById('main-setup-view');
      const editView = document.getElementById('edit-vocab-view');
      if (showEdit) {
        mainView.classList.add('hidden');
        editView.classList.remove('hidden');
      } else {
        editView.classList.add('hidden');
        mainView.classList.remove('hidden');
        updateVocabCount();
      }
    }

    function setGameMode(mode) {
      gameMode = mode;
      scores = { 1: 0, 2: 0 }; 
      
      const btnPve = document.getElementById('btn-mode-pve');
      const btnPvp = document.getElementById('btn-mode-pvp');
      
      // 重置雙方樣式
      btnPve.className = "flex-1 flex flex-col items-center p-5 rounded-2xl border-2 transition-all border-gray-200 bg-white hover:bg-gray-50 text-gray-400 hover:text-gray-500";
      btnPvp.className = "flex-1 flex flex-col items-center p-5 rounded-2xl border-2 transition-all border-gray-200 bg-white hover:bg-gray-50 text-gray-400 hover:text-gray-500";
      
      // 更新 icon 容器背景
      btnPve.querySelector('div').className = "bg-gray-50 p-3 rounded-full mb-3";
      btnPve.querySelector('i').className = "ph-fill ph-robot text-4xl current-color";
      btnPvp.querySelector('div').className = "bg-gray-50 p-3 rounded-full mb-3";
      btnPvp.querySelector('i').className = "ph-fill ph-users-three text-4xl current-color";
      
      // 隱藏副標題特殊顏色
      btnPve.querySelector('span:last-child').className = "text-sm mt-1 font-bold";
      btnPvp.querySelector('span:last-child').className = "text-sm mt-1 font-bold";
      btnPve.querySelector('span:first-of-type').className = "font-black text-xl";
      btnPvp.querySelector('span:first-of-type').className = "font-black text-xl";

      // 設置被選中的按鈕樣式 (高亮)
      const activeBtn = mode === 'pve' ? btnPve : btnPvp;
      activeBtn.className = "flex-1 flex flex-col items-center p-5 rounded-2xl border-2 transition-all border-orange-400 bg-orange-50 ring-4 ring-orange-400/20 shadow-md transform scale-[1.02]";
      activeBtn.querySelector('div').className = "bg-white p-3 rounded-full shadow-sm mb-3";
      activeBtn.querySelector('i').classList.add('text-orange-500');
      activeBtn.querySelector('i').classList.remove('current-color');
      activeBtn.querySelector('span:first-of-type').className = "font-black text-xl text-orange-700";
      activeBtn.querySelector('span:last-child').className = "text-sm text-orange-500/80 mt-1 font-bold";
    }

    // ==================== 遊戲核心邏輯 ====================
    function initGame() {
      let words = getWordList();
      if (words.length === 0) words = ['中文', '華語', '學習', '快樂'];

      board = [];
      for (let i = 0; i < BOARD_SIZE * BOARD_SIZE; i++) {
        const r = Math.floor(i / BOARD_SIZE);
        const c = i % BOARD_SIZE;
        
        const adjacentWords = new Set();
        if (r > 0 && c > 0) adjacentWords.add(board[(r - 1) * BOARD_SIZE + (c - 1)].word);
        if (r > 0) adjacentWords.add(board[(r - 1) * BOARD_SIZE + c].word);
        if (r > 0 && c < BOARD_SIZE - 1) adjacentWords.add(board[(r - 1) * BOARD_SIZE + (c + 1)].word);
        if (c > 0) adjacentWords.add(board[r * BOARD_SIZE + (c - 1)].word);

        let availableWords = words.filter(w => !adjacentWords.has(w));
        if (availableWords.length === 0) availableWords = words;

        const randomWord = availableWords[Math.floor(Math.random() * availableWords.length)];
        board.push({ word: randomWord, owner: null });
      }

      currentPlayer = 1;
      winningLine = [];
      isComputerThinking = false;
      gameState = 'playing';
      
      timeElapsed = 0;
      updateTimerDisplay();
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timeElapsed++;
        updateTimerDisplay();
      }, 1000);

      document.getElementById('setup-screen').classList.add('hidden');
      document.getElementById('game-screen').classList.remove('hidden');
      document.getElementById('gameover-modal').classList.add('hidden');
      
      document.getElementById('p2-name').innerText = gameMode === 'pve' ? '電腦' : '白棋';
      document.getElementById('p2-icon').className = gameMode === 'pve' ? 'ph-fill ph-robot text-gray-500 text-sm sm:text-base' : 'ph-fill ph-user text-gray-500 text-sm sm:text-base';
      
      document.getElementById('game-hint').innerHTML = gameMode === 'pve' 
        ? '<i class="ph-fill ph-lightbulb text-yellow-500 text-xl"></i> 點擊格子放上棋子。電腦會自動讀出詞彙，請跟著大聲念喔！' 
        : '<i class="ph-fill ph-lightbulb text-yellow-500 text-xl"></i> 點擊格子放上棋子。請大聲念出格子裡的字再下棋喔！';
      
      updateScoresUI();
      renderBoard();
      updatePlayerTurnUI();
    }

    function returnToSetup() {
      gameState = 'setup';
      scores = { 1: 0, 2: 0 };
      if (timerInterval) clearInterval(timerInterval);
      document.getElementById('game-screen').classList.add('hidden');
      document.getElementById('setup-screen').classList.remove('hidden');
    }

    function handleCellClick(index) {
      if (gameState !== 'playing' || board[index].owner !== null || isComputerThinking) return;

      const word = board[index].word;
      
      if (!isMuted) {
         if (gameMode === 'pve' && currentPlayer === 1) {
            speakText(word);
         } else if (gameMode === 'pvp') {
            speakText(word);
         }
      }

      placePiece(index, currentPlayer);
    }

    function placePiece(index, player) {
      board[index].owner = player;
      
      const winLine = checkWin(player);
      if (winLine) {
        winningLine = winLine;
        scores[player]++;
        endGame(player);
        return;
      }

      if (board.every(cell => cell.owner !== null)) {
        endGame('draw');
        return;
      }

      if (!checkPossibleWin(1) && !checkPossibleWin(2)) {
        endGame('draw');
        return;
      }

      currentPlayer = player === 1 ? 2 : 1;
      updatePlayerTurnUI();
      renderBoard(); 

      if (gameMode === 'pve' && currentPlayer === 2) {
        isComputerThinking = true;
        setTimeout(() => aiMove(), 800); 
      }
    }

    function endGame(winner) {
      gameState = 'gameover';
      if (timerInterval) clearInterval(timerInterval);
      updateScoresUI();
      renderBoard(); 

      const modal = document.getElementById('gameover-modal');
      const winnerText = document.getElementById('winner-text');
      const descText = document.getElementById('gameover-desc'); 
      const modalIcon = document.getElementById('modal-icon');
      
      if (winner === 'draw') {
        winnerText.innerText = '平手！';
        modalIcon.className = "ph-fill ph-handshake text-[6rem] text-blue-400 mx-auto mb-6 block drop-shadow-lg";
        if (board.some(cell => cell.owner === null)) {
          descText.innerText = '雙方都沒有機會連線了，提前結束平手！';
        } else {
          descText.innerText = '棋盤下滿了，雙方不分軒輊！';
        }
      } else {
        winnerText.innerText = `${winner === 1 ? '黑棋' : '白棋'} 獲勝！`;
        modalIcon.className = "ph-fill ph-trophy text-[6rem] text-orange-500 mx-auto mb-6 block drop-shadow-lg";
        descText.innerText = '太棒了！大家都學會好多新詞了！';
      }
      
      setTimeout(() => {
        modal.classList.remove('hidden');
      }, 500);
    }

    // ==================== UI 更新與渲染 ====================
    function renderBoard() {
      const container = document.getElementById('board-container');
      container.innerHTML = '';

      board.forEach((cell, index) => {
        const isWinningCell = winningLine.includes(index);
        
        // 基礎樣式設計
        let el = document.createElement('div');
        let span = document.createElement('span');
        
        // 空格子的凹槽設計 (木頭刻印感)
        if (cell.owner === null) {
          let interactionStyle = (currentPlayer === 1 && !isComputerThinking && gameState === 'playing') 
            ? "cursor-pointer hover:bg-[#c98e4e] hover:shadow-[inset_0_4px_10px_rgba(0,0,0,0.3)]" 
            : "cursor-default";
            
          el.className = `relative flex items-center justify-center aspect-square rounded-full transition-all duration-300 bg-[#d89f5c] shadow-[inset_0_3px_8px_rgba(100,50,0,0.35)] ${interactionStyle}`;
          
          span.className = `text-center font-bold px-0.5 select-none pointer-events-none z-10 scalable-text engraved-text`;
          span.innerText = cell.word;
          
          // 喇叭提示圖示
          if (gameMode === 'pve' && currentPlayer === 1 && !isComputerThinking && !isMuted && gameState === 'playing') {
            const iconDiv = document.createElement('div');
            iconDiv.className = "absolute top-[10%] right-[10%] opacity-0 hover:opacity-100 md:hidden z-20 transition-opacity";
            iconDiv.innerHTML = '<i class="ph-fill ph-speaker-high w-3 h-3 sm:w-4 sm:h-4 text-[#8b4513]/40"></i>';
            el.onmouseenter = () => iconDiv.classList.replace('opacity-0', 'opacity-100');
            el.onmouseleave = () => iconDiv.classList.replace('opacity-100', 'opacity-0');
            el.appendChild(iconDiv);
          }
        } 
        // 玩家 1 (黑棋) - 立體曜石黑
        else if (cell.owner === 1) {
          el.className = `relative flex items-center justify-center aspect-square rounded-full transition-all duration-300 bg-[radial-gradient(circle_at_30%_30%,#52525b,#09090b)] shadow-[0_4px_8px_rgba(0,0,0,0.6),inset_-2px_-2px_6px_rgba(0,0,0,0.8),inset_2px_2px_6px_rgba(255,255,255,0.2)] cursor-default scale-[0.95]`;
          if (isWinningCell) el.classList.add('ring-4', 'ring-yellow-400', 'ring-offset-2', 'ring-offset-[#d29b59]', 'animate-pulse', 'z-20', 'scale-100');
          
          span.className = `text-center font-black px-0.5 select-none pointer-events-none z-10 scalable-text text-white drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)]`;
          span.innerText = cell.word;
        } 
        // 玩家 2 (白棋) - 立體珍珠白
        else if (cell.owner === 2) {
          el.className = `relative flex items-center justify-center aspect-square rounded-full transition-all duration-300 bg-[radial-gradient(circle_at_30%_30%,#ffffff,#d4d4d8)] shadow-[0_4px_8px_rgba(0,0,0,0.3),inset_-2px_-2px_6px_rgba(0,0,0,0.1),inset_2px_2px_6px_rgba(255,255,255,0.8)] cursor-default scale-[0.95]`;
          if (isWinningCell) el.classList.add('ring-4', 'ring-yellow-400', 'ring-offset-2', 'ring-offset-[#d29b59]', 'animate-pulse', 'z-20', 'scale-100');
          
          span.className = `text-center font-black px-0.5 select-none pointer-events-none z-10 scalable-text text-gray-700 drop-shadow-[0_1px_1px_rgba(255,255,255,1)]`;
          span.innerText = cell.word;
        }

        el.onclick = () => handleCellClick(index);
        el.appendChild(span);
        container.appendChild(el);
      });
    }

    function updatePlayerTurnUI() {
      const p1 = document.getElementById('player1-indicator');
      const p2 = document.getElementById('player2-indicator');
      
      const activeClass = "flex-1 flex flex-col sm:flex-row items-center justify-center gap-2 sm:gap-4 px-2 sm:px-6 py-2 sm:py-3 rounded-xl transition-all duration-300 bg-gray-900 text-white shadow-xl scale-105 ring-4 ring-orange-400/50";
      const inactiveClass = "flex-1 flex flex-col sm:flex-row items-center justify-center gap-2 sm:gap-4 px-2 sm:px-6 py-2 sm:py-3 rounded-xl transition-all duration-300 bg-white/50 text-gray-400 border border-gray-200";
      const inactiveClassReverse = "flex-1 flex flex-col sm:flex-row-reverse items-center justify-center gap-2 sm:gap-4 px-2 sm:px-6 py-2 sm:py-3 rounded-xl transition-all duration-300 bg-white/50 text-gray-400 border border-gray-200";

      if (currentPlayer === 1) {
        p1.className = activeClass;
        p2.className = inactiveClassReverse;
      } else {
        p2.className = activeClass.replace('sm:flex-row', 'sm:flex-row-reverse');
        p1.className = inactiveClass;
      }
    }

    function updateScoresUI() {
      document.getElementById('score-p1').innerText = scores[1];
      document.getElementById('score-p2').innerText = scores[2];
    }

    function updateTimerDisplay() {
      const min = String(Math.floor(timeElapsed / 60)).padStart(2, '0');
      const sec = String(timeElapsed % 60).padStart(2, '0');
      document.getElementById('timer-display').innerText = `${min}:${sec}`;
    }

    // ==================== 五子棋演算法 (保持不變) ====================
    function checkWin(player) {
      const size = BOARD_SIZE;
      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          if (board[r * size + c]?.owner !== player) continue;
          if (c <= size - 5) {
            const line = [0, 1, 2, 3, 4].map(i => r * size + c + i);
            if (line.every(idx => board[idx]?.owner === player)) return line;
          }
          if (r <= size - 5) {
            const line = [0, 1, 2, 3, 4].map(i => (r + i) * size + c);
            if (line.every(idx => board[idx]?.owner === player)) return line;
          }
          if (r <= size - 5 && c <= size - 5) {
            const line = [0, 1, 2, 3, 4].map(i => (r + i) * size + c + i);
            if (line.every(idx => board[idx]?.owner === player)) return line;
          }
          if (r <= size - 5 && c >= 4) {
            const line = [0, 1, 2, 3, 4].map(i => (r + i) * size + c - i);
            if (line.every(idx => board[idx]?.owner === player)) return line;
          }
        }
      }
      return null;
    }

    function checkPossibleWin(player) {
      const size = BOARD_SIZE;
      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          if (c <= size - 5) {
            const line = [0, 1, 2, 3, 4].map(i => r * size + c + i);
            if (line.every(idx => board[idx].owner === player || board[idx].owner === null)) return true;
          }
          if (r <= size - 5) {
            const line = [0, 1, 2, 3, 4].map(i => (r + i) * size + c);
            if (line.every(idx => board[idx].owner === player || board[idx].owner === null)) return true;
          }
          if (r <= size - 5 && c <= size - 5) {
            const line = [0, 1, 2, 3, 4].map(i => (r + i) * size + c + i);
            if (line.every(idx => board[idx].owner === player || board[idx].owner === null)) return true;
          }
          if (r <= size - 5 && c >= 4) {
            const line = [0, 1, 2, 3, 4].map(i => (r + i) * size + c - i);
            if (line.every(idx => board[idx].owner === player || board[idx].owner === null)) return true;
          }
        }
      }
      return false; 
    }

    function evaluateCell(r, c, player) {
      let score = 0;
      const directions = [[1, 0], [0, 1], [1, 1], [1, -1]]; 
      directions.forEach(dir => {
        let count = 1; let openEnds = 0; let [dx, dy] = dir;
        let r1 = r + dx, c1 = c + dy;
        while (r1 >= 0 && r1 < BOARD_SIZE && c1 >= 0 && c1 < BOARD_SIZE && board[r1 * BOARD_SIZE + c1].owner === player) { count++; r1 += dx; c1 += dy; }
        if (r1 >= 0 && r1 < BOARD_SIZE && c1 >= 0 && c1 < BOARD_SIZE && board[r1 * BOARD_SIZE + c1].owner === null) openEnds++;
        let r2 = r - dx, c2 = c - dy;
        while (r2 >= 0 && r2 < BOARD_SIZE && c2 >= 0 && c2 < BOARD_SIZE && board[r2 * BOARD_SIZE + c2].owner === player) { count++; r2 -= dx; c2 -= dy; }
        if (r2 >= 0 && r2 < BOARD_SIZE && c2 >= 0 && c2 < BOARD_SIZE && board[r2 * BOARD_SIZE + c2].owner === null) openEnds++;
        
        if (count >= 5) score += 100000; 
        else if (count === 4) { if (openEnds === 2) score += 10000; else if (openEnds === 1) score += 1000; }
        else if (count === 3) { if (openEnds === 2) score += 1000; else if (openEnds === 1) score += 100; }
        else if (count === 2) { if (openEnds === 2) score += 100; else if (openEnds === 1) score += 10; }
      });
      return score;
    }

    function aiMove() {
      if (gameState !== 'playing') return;
      let bestScore = -1; let bestMoves = [];
      for (let i = 0; i < BOARD_SIZE * BOARD_SIZE; i++) {
        if (board[i].owner === null) {
          const r = Math.floor(i / BOARD_SIZE); const c = i % BOARD_SIZE;
          const attackScore = evaluateCell(r, c, 2); 
          const defenseScore = evaluateCell(r, c, 1); 
          const totalScore = attackScore + defenseScore * 1.2;
          if (totalScore > bestScore) { bestScore = totalScore; bestMoves = [i]; } 
          else if (totalScore === bestScore && totalScore > 0) { bestMoves.push(i); }
        }
      }
      let bestMove = -1;
      if (bestMoves.length > 0) {
        bestMove = bestMoves[Math.floor(Math.random() * bestMoves.length)];
      } else {
        const centerMoves = [44, 45, 54, 55];
        const availableCenters = centerMoves.filter(idx => board[idx].owner === null);
        if (availableCenters.length > 0) { bestMove = availableCenters[Math.floor(Math.random() * availableCenters.length)]; } 
        else {
          const emptyCells = [];
          for (let i = 0; i < board.length; i++) if (board[i].owner === null) emptyCells.push(i);
          if (emptyCells.length > 0) bestMove = emptyCells[Math.floor(Math.random() * emptyCells.length)];
        }
      }
      if (bestMove !== -1) { placePiece(bestMove, 2); }
      isComputerThinking = false;
    }

    // ==================== 輔助功能 ====================
    function speakText(text) {
      if (isMuted) return;
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-TW';
        utterance.rate = 0.85;
        utterance.pitch = 1.1;
        window.speechSynthesis.speak(utterance);
      }
    }

    function toggleMute() {
      isMuted = !isMuted;
      const btn = document.getElementById('btn-mute');
      const icon = document.getElementById('icon-mute');
      const text = document.getElementById('text-mute');

      if (isMuted) {
        btn.className = "bg-red-50/80 backdrop-blur-sm text-red-600 px-3 sm:px-4 py-2 sm:py-2.5 rounded-xl shadow-sm border border-red-100 hover:bg-red-100 font-bold flex items-center gap-2 transition-all hover:-translate-y-0.5 active:translate-y-0";
        icon.className = "ph-bold ph-speaker-slash text-xl";
        text.innerText = "已靜音";
      } else {
        btn.className = "bg-green-100/80 backdrop-blur-sm text-green-700 px-3 sm:px-4 py-2 sm:py-2.5 rounded-xl shadow-sm border border-white/50 hover:bg-green-100 font-bold flex items-center gap-2 transition-all hover:-translate-y-0.5 active:translate-y-0";
        icon.className = "ph-bold ph-speaker-high text-xl";
        text.innerText = "語音開啟";
      }
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => console.log('Fullscreen error:', err));
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        }
      }
    }

    function updateFullscreenUI() {
      const icon = document.getElementById('icon-fullscreen');
      const text = document.getElementById('text-fullscreen');
      
      if (isFullscreen) {
        icon.className = "ph-bold ph-corners-in text-xl";
        text.innerText = "退出";
      } else {
        icon.className = "ph-bold ph-corners-out text-xl";
        text.innerText = "全螢幕";
      }
    }
  </script>
